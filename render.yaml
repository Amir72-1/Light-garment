services:
  - type: web
    name: light-garment-erp
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DEMO_MODE
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
